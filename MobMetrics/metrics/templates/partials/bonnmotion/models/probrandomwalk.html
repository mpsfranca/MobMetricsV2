<!-- ProbRandomWalk Specific Parameters -->
<fieldset class="model card-body p-3 p-md-4 d-none" id="ProbRandomWalk">
    <div class="col-md-12">
        <label class="form-label fw-semibold" for="{{ model_specific_parameters_form.parameters.id_for_label }}">
            Parameters
        </label>
        {{ model_specific_parameters_form.parameters }}
    </div>
</fieldset>

<div class="modal fade" id="helpModal-ProbRandomWalk" tabindex="-1" aria-labelledby="probRandomWalkHelpModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">


            <div class="modal-header">
                <h5 class="modal-title" id="probRandomWalkHelpModalLabel">How to use ProbRandomWalk</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>


            <div class="modal-body">
                <div class="card border-0">
                    <div class="card-body p-0">


                        <div class="card mb-0 shadow-sm">
                            <div class="card-body">
                                <h6 class="card-title mb-1">
                                    Time interval to advance by (-t)
                                    <span class="badge text-bg-secondary ms-2">Optional</span>
                                </h6>
                                <p class="text-body-secondary small mb-0">
                                    Defines the step interval used to advance time and movement in the probabilistic random walk.
                                </p>
                            </div>
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span class="text-body-secondary">Units</span>
                                    <span class="fw-semibold">time units / seconds</span>
                                </li>
                                <li class="list-group-item">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="text-body-secondary">Enter</span>
                                        <span class="fw-semibold">Positive number</span>
                                    </div>
                                    <div class="small mt-1 text-body-secondary">
                                        Default: <code>1</code>
                                    </div>
                                </li>
                            </ul>
                        </div>


                        <div class="card mt-3 shadow-sm">
                            <div class="card-body">
                                <h6 class="card-title mb-1">Example:</h6>
                                <pre class="mb-0 mt-1"><code>-t 1</code></pre>
                            </div>
                        </div>


                    </div>
                </div>
            </div>


            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>


        </div>
    </div>
</div>
